<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Pac-Man風 Webゲーム</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #131a2e;
      --panel-2: #1b2440;
      --wall: #2f6fff;
      --dot: #fff0a8;
      --power: #7df9ff;
      --player: #ffd84d;
      --ghost: #ff6aa9;
      --ghost-scared: #7df9ff;
      --text: #eef3ff;
      --muted: #9aa8d1;
      --danger: #ff7676;
      --ok: #67e8a5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #17203b 0%, var(--bg) 55%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: min(1100px, 100%);
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 18px;
    }

    html, body {
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    .panel, .game-wrap {
      background: rgba(19, 26, 46, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    .panel {
      padding: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 18px;
    }

    .stat {
      background: var(--panel-2);
      border-radius: 18px;
      padding: 14px;
    }

    .stat .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .stat .value {
      font-size: 28px;
      font-weight: 800;
    }

    .section {
      margin-top: 14px;
      background: var(--panel-2);
      border-radius: 18px;
      padding: 14px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .progress {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #67e8a5, #7df9ff);
      transition: width 0.18s linear;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 16px;
      background: #2a355b;
      color: var(--text);
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease, background 0.12s ease;
      touch-action: manipulation;
      min-height: 44px;
    }

    button:hover { opacity: 0.96; }
    button:active { transform: scale(0.97); }

    .primary { background: #3957d7; }
    .danger { background: #9d3850; }

    .controls {
      margin-top: 8px;
      display: grid;
      place-items: center;
      gap: 8px;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .row {
      display: flex;
      gap: 8px;
    }

    .arrow {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      font-size: 22px;
    }

    .help {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .game-wrap {
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      position: relative;
    }

    #game {
      background: #050914;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 12px;
      display: grid;
      gap: 0;
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.35);
      touch-action: none;
    }

    .cell {
      width: 30px;
      height: 30px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #050914;
    }

    .wall {
      background: var(--wall);
      border-radius: 8px;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.08);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--dot);
    }

    .power {
      width: 15px;
      height: 15px;
      border-radius: 999px;
      background: var(--power);
      animation: pulse 0.8s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.25); }
    }

    .player {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: conic-gradient(from 40deg, transparent 0 50deg, var(--player) 50deg 360deg);
      animation: chomp 0.35s infinite;
      position: relative;
    }

    .player::after {
      content: "";
      position: absolute;
      right: 3px;
      top: 9px;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #1d2333;
    }

    .dir-right { transform: rotate(0deg); }
    .dir-left { transform: rotate(180deg); }
    .dir-up { transform: rotate(270deg); }
    .dir-down { transform: rotate(90deg); }

    @keyframes chomp {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(0.92); }
    }

    .ghost {
      width: 22px;
      height: 22px;
      position: relative;
      animation: float 0.7s infinite ease-in-out;
    }

    .ghost-body {
      position: absolute;
      left: 0;
      top: 2px;
      width: 22px;
      height: 18px;
      background: var(--ghost);
      border-radius: 12px 12px 6px 6px;
      overflow: hidden;
    }

    .ghost.scared .ghost-body { background: var(--ghost-scared); }

    .ghost-body::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -2px;
      height: 8px;
      background:
        radial-gradient(circle at 3px 0, transparent 5px, currentColor 5px) 0 0 / 7px 8px repeat-x;
      color: inherit;
      opacity: 0.9;
    }

    .eyes {
      position: absolute;
      top: 7px;
      left: 5px;
      display: flex;
      gap: 4px;
    }

    .eye {
      width: 4px;
      height: 6px;
      border-radius: 999px;
      background: #fff;
      position: relative;
    }

    .eye::after {
      content: "";
      position: absolute;
      left: 1px;
      top: 1px;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: #222;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    .footer-note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 920px) {
      .app { grid-template-columns: 1fr; }
      .panel { order: 2; }
      .game-wrap { order: 1; }
    }

    @media (max-width: 520px) {
      body {
        padding: 8px;
        align-items: stretch;
      }
      .app {
        gap: 10px;
      }
      .panel, .game-wrap {
        border-radius: 18px;
      }
      .panel {
        padding: 14px;
      }
      h1 {
        font-size: 24px;
      }
      .stats {
        grid-template-columns: repeat(3, 1fr);
      }
      .stat {
        padding: 10px;
      }
      .stat .value {
        font-size: 22px;
      }
      .buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .arrow {
        width: 64px;
        height: 64px;
        font-size: 26px;
      }
      .footer-note {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel">
      <div class="badge">1ファイルHTML版</div>
      <h1>Pac-Man風 Webゲーム</h1>

      <div class="stats">
        <div class="stat">
          <div class="label">Score</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="stat">
          <div class="label">Lives</div>
          <div class="value" id="lives">3</div>
        </div>
        <div class="stat">
          <div class="label">Dots</div>
          <div class="value" id="dots">0</div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">進行度 <span id="progressText">0%</span></div>
        <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
      </div>

      <div class="section">
        <div class="section-title">状態</div>
        <div id="status">Press Start</div>
      </div>

      <div class="buttons">
        <button class="primary" id="startBtn">Start / Pause</button>
        <button class="danger" id="resetBtn">Reset</button>
      </div>

      <div class="section">
        <div class="section-title">操作</div>
        <div class="help">矢印キー、または下のボタンで方向変更。スペースキーで一時停止。</div>
        <div class="controls">
          <div class="row"><button class="arrow" data-dir="up">↑</button></div>
          <div class="row">
            <button class="arrow" data-dir="left">←</button>
            <button class="arrow" data-dir="down">↓</button>
            <button class="arrow" data-dir="right">→</button>
          </div>
        </div>
      </div>

      <div class="footer-note">
        青い大玉を取ると、しばらくの間だけゴーストを食べられます。<br>
        スマホでは <strong>スワイプ操作</strong> と画面下の方向ボタンの両方に対応しています。<br>
        このファイルを <strong>index.html</strong> として保存すれば、そのままブラウザで遊べます。
      </div>
    </div>

    <div class="game-wrap">
      <div id="game"></div>
    </div>
  </div>

  <script>
    let CELL = 30;
    const TICK_MS = 180;
    const RAW_MAP = [
      '###############',
      '#........#....#',
      '#.###.##.#.##.#',
      '#o#........#o.#',
      '#.#.#####.#.#.#',
      '#.#...#...#.#.#',
      '#..##.#.##....#',
      '###...G...###.#',
      '#....##.##....#',
      '#.#...P...#.#.#',
      '#.#.#####.#.#.#',
      '#o..........o.#',
      '#.##.#.#.#.##.#',
      '#....#...#....#',
      '###############'
    ];

    const DIRS = {
      up: { x: 0, y: -1, name: 'up' },
      down: { x: 0, y: 1, name: 'down' },
      left: { x: -1, y: 0, name: 'left' },
      right: { x: 1, y: 0, name: 'right' }
    };

    const gameEl = document.getElementById('game');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const dotsEl = document.getElementById('dots');
    const statusEl = document.getElementById('status');
    const progressBarEl = document.getElementById('progressBar');
    const progressTextEl = document.getElementById('progressText');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');

    let state;
    let nextDir = 'left';
    let timer = null;
    let touchStartX = 0;
    let touchStartY = 0;

    function cloneMap(map) {
      return map.map(row => row.split(''));
    }

    function findChar(grid, char) {
      for (let y = 0; y < grid.length; y++) {
        for (let x = 0; x < grid[y].length; x++) {
          if (grid[y][x] === char) return { x, y };
        }
      }
      return { x: 1, y: 1 };
    }

    function countDots(grid) {
      let total = 0;
      grid.forEach(row => row.forEach(cell => {
        if (cell === '.' || cell === 'o') total += 1;
      }));
      return total;
    }

    function isWall(grid, x, y) {
      return grid[y] && grid[y][x] === '#';
    }

    function randomGhostStep(grid, ghost, pacman) {
      const choices = Object.values(DIRS)
        .map(dir => ({ ...dir, x2: ghost.x + dir.x, y2: ghost.y + dir.y }))
        .filter(dir => !isWall(grid, dir.x2, dir.y2));

      if (!choices.length) return ghost;

      const towardPacman = [...choices].sort((a, b) => {
        const da = Math.abs(a.x2 - pacman.x) + Math.abs(a.y2 - pacman.y);
        const db = Math.abs(b.x2 - pacman.x) + Math.abs(b.y2 - pacman.y);
        return da - db;
      });

      const chosen = Math.random() < 0.7
        ? towardPacman[0]
        : choices[Math.floor(Math.random() * choices.length)];

      return { x: chosen.x2, y: chosen.y2, dir: chosen.name };
    }

    function getInitialState() {
      const grid = cloneMap(RAW_MAP);
      const pacman = findChar(grid, 'P');
      const ghostStart = findChar(grid, 'G');
      grid[pacman.y][pacman.x] = ' ';
      grid[ghostStart.y][ghostStart.x] = ' ';

      return {
        grid,
        pacman: { ...pacman, dir: 'left' },
        ghost: { ...ghostStart, dir: 'left' },
        score: 0,
        lives: 3,
        remainingDots: countDots(grid),
        totalDots: countDots(grid),
        running: false,
        status: 'Press Start',
        poweredTicks: 0,
        gameOver: false,
        win: false
      };
    }

    function drawPlayer(dir) {
      const wrap = document.createElement('div');
      wrap.className = `player dir-${dir}`;
      return wrap;
    }

    function drawGhost(scared) {
      const wrap = document.createElement('div');
      wrap.className = `ghost${scared ? ' scared' : ''}`;
      wrap.style.color = scared ? 'var(--ghost-scared)' : 'var(--ghost)';
      wrap.innerHTML = `
        <div class="ghost-body"></div>
        <div class="eyes">
          <div class="eye"></div>
          <div class="eye"></div>
        </div>
      `;
      return wrap;
    }

    function render() {
      const cols = state.grid[0].length;
      gameEl.style.gridTemplateColumns = `repeat(${cols}, ${CELL}px)`;
      gameEl.innerHTML = '';

      for (let y = 0; y < state.grid.length; y++) {
        for (let x = 0; x < state.grid[y].length; x++) {
          const cell = document.createElement('div');
          cell.className = 'cell';

          const tile = state.grid[y][x];
          const isPacman = state.pacman.x === x && state.pacman.y === y;
          const isGhost = state.ghost.x === x && state.ghost.y === y;
          const scared = state.poweredTicks > 0;

          if (tile === '#') cell.classList.add('wall');
          if (!isPacman && !isGhost && tile === '.') {
            const dot = document.createElement('div');
            dot.className = 'dot';
            cell.appendChild(dot);
          }
          if (!isPacman && !isGhost && tile === 'o') {
            const power = document.createElement('div');
            power.className = 'power';
            cell.appendChild(power);
          }
          if (isPacman) cell.appendChild(drawPlayer(state.pacman.dir));
          if (isGhost) cell.appendChild(drawGhost(scared));

          gameEl.appendChild(cell);
        }
      }

      scoreEl.textContent = state.score;
      livesEl.textContent = state.lives;
      dotsEl.textContent = state.remainingDots;
      statusEl.textContent = state.status;
      const progress = Math.round(((state.totalDots - state.remainingDots) / state.totalDots) * 100);
      progressBarEl.style.width = progress + '%';
      progressTextEl.textContent = progress + '%';
    }

    function updateCellSize() {
      const cols = RAW_MAP[0].length;
      const available = Math.min(window.innerWidth - 40, 560);
      const base = Math.floor((available - 24) / cols);
      CELL = Math.max(20, Math.min(30, base));
      if (state) render();
    }

    function syncTimer() {
      if (timer) clearInterval(timer);
      if (state.running && !state.gameOver && !state.win) {
        timer = setInterval(() => {
          tick();
        }, TICK_MS);
      }
    }

    function loseLifeKeepBoard() {
      const fresh = getInitialState();
      state.pacman = { ...fresh.pacman, dir: state.pacman.dir };
      state.ghost = { ...fresh.ghost, dir: 'left' };
      state.poweredTicks = 0;
    }

    function tick() {
      const grid = state.grid.map(row => [...row]);
      let pacman = { ...state.pacman };
      let ghost = { ...state.ghost };
      let score = state.score;
      let lives = state.lives;
      let remainingDots = state.remainingDots;
      let poweredTicks = Math.max(0, state.poweredTicks - 1);
      let running = state.running;
      let status = state.status;
      let gameOver = state.gameOver;
      let win = state.win;

      const desired = DIRS[nextDir];
      if (desired && !isWall(grid, pacman.x + desired.x, pacman.y + desired.y)) {
        pacman.dir = desired.name;
      }

      const current = DIRS[pacman.dir] || DIRS.left;
      const nextX = pacman.x + current.x;
      const nextY = pacman.y + current.y;
      if (!isWall(grid, nextX, nextY)) {
        pacman.x = nextX;
        pacman.y = nextY;
      }

      const tile = grid[pacman.y][pacman.x];
      if (tile === '.') {
        grid[pacman.y][pacman.x] = ' ';
        score += 10;
        remainingDots -= 1;
      } else if (tile === 'o') {
        grid[pacman.y][pacman.x] = ' ';
        score += 50;
        remainingDots -= 1;
        poweredTicks = 24;
        status = 'Power mode! Ghost is scared';
      }

      ghost = randomGhostStep(grid, ghost, pacman);

      if (ghost.x === pacman.x && ghost.y === pacman.y) {
        if (poweredTicks > 0) {
          score += 200;
          const restart = findChar(cloneMap(RAW_MAP), 'G');
          ghost = { ...restart, dir: 'left' };
          status = 'Ghost eaten!';
        } else {
          lives -= 1;
          if (lives <= 0) {
            running = false;
            gameOver = true;
            status = 'Game Over';
          } else {
            state.grid = grid;
            state.score = score;
            state.lives = lives;
            state.remainingDots = remainingDots;
            state.status = `Ouch! Lives left: ${lives}`;
            state.poweredTicks = 0;
            loseLifeKeepBoard();
            render();
            syncTimer();
            return;
          }
        }
      }

      if (remainingDots <= 0) {
        running = false;
        win = true;
        status = 'Stage Clear!';
      } else if (!gameOver && poweredTicks === 0 && status === 'Power mode! Ghost is scared') {
        status = 'Keep going';
      }

      state = {
        ...state,
        grid,
        pacman,
        ghost,
        score,
        lives,
        remainingDots,
        poweredTicks,
        running,
        status,
        gameOver,
        win
      };

      render();
      syncTimer();
    }

    function toggleStartPause() {
      if (state.gameOver || state.win) {
        state.status = 'Reset to play again';
        render();
        return;
      }
      state.running = !state.running;
      state.status = state.running ? 'Playing' : 'Paused';
      render();
      syncTimer();
    }

    function resetGame() {
      state = getInitialState();
      nextDir = 'left';
      render();
      syncTimer();
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowUp') { e.preventDefault(); nextDir = 'up'; }
      if (e.key === 'ArrowDown') { e.preventDefault(); nextDir = 'down'; }
      if (e.key === 'ArrowLeft') { e.preventDefault(); nextDir = 'left'; }
      if (e.key === 'ArrowRight') { e.preventDefault(); nextDir = 'right'; }
      if (e.key === ' ') {
        e.preventDefault();
        toggleStartPause();
      }
    });

    document.querySelectorAll('[data-dir]').forEach(btn => {
      const setDirection = () => {
        nextDir = btn.dataset.dir;
      };
      btn.addEventListener('click', setDirection);
      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        setDirection();
      }, { passive: false });
    });

    gameEl.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: true });

    gameEl.addEventListener('touchmove', (e) => {
      e.preventDefault();
    }, { passive: false });

    gameEl.addEventListener('touchend', (e) => {
      const touch = e.changedTouches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;
      const absX = Math.abs(dx);
      const absY = Math.abs(dy);
      if (Math.max(absX, absY) < 20) return;
      if (absX > absY) {
        nextDir = dx > 0 ? 'right' : 'left';
      } else {
        nextDir = dy > 0 ? 'down' : 'up';
      }
    }, { passive: true });

    window.addEventListener('resize', updateCellSize);

    startBtn.addEventListener('click', toggleStartPause);
    startBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      toggleStartPause();
    }, { passive: false });

    resetBtn.addEventListener('click', resetGame);
    resetBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      resetGame();
    }, { passive: false });

    updateCellSize();
    resetGame();
  </script>
</body>
</html>
